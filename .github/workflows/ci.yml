name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install ruff==0.15.8
      - name: Ruff (lint)
        run: ruff check app/ tests/ evalkit/
      - name: Run tests
        run: python tests/run_all.py

  typecheck:
    name: Type check (informational)
    runs-on: ubuntu-latest
    # 段階導入(フェーズ0): 当面は非ブロッキング。型エラーは情報として可視化するが
    # マージは止めない。段階的に解消し、いずれブロッキング化する。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install mypy==1.19.1
      - name: Mypy
        run: mypy app/

  frontend-lint:
    name: Frontend lint (ESLint no-undef)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build JS bundle (classic scripts share one global scope)
        run: |
          files=$(grep -oE '/static/js/[a-z_]+\.js' app/static/index.html | sed 's#/static#app/static#')
          cat $files > _eslint_bundle.js
      - name: ESLint (no-undef)
        run: npx --yes eslint@9 _eslint_bundle.js
